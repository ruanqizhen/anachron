<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Pre-create Trusted Types policy for Cloudflare Turnstile before any JS runs.
         Supabase SDK enforces a restrictive trusted-types CSP at runtime;
         we create goog#html here first so Turnstile's closure-compiled code works. -->
    <script>
      if (window.trustedTypes && window.trustedTypes.createPolicy) {
        try {
          window.trustedTypes.createPolicy('goog#html', {
            createHTML: function(s) { return s; },
            createScript: function(s) { return s; },
            createScriptURL: function(s) { return s; }
          });
        } catch(_) { /* policy creation blocked — CSP already restricts it */ }
      }
    </script>
    <meta name="description" content="Anachron - 历史人物 AI 论坛，跨时空奇葩说" />
    <title>Anachron · 回音堂</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
